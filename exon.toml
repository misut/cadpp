[package]
name = "cadpp"
version = "0.0.1"
description = "cad++ — DWG viewer (Android + macOS) built on phenotype"
# Library archive consumed by either the desktop binary in `native/` or
# the Android NDK glue under `android/app/src/main/cpp/`. Splitting `int
# main` out of this package is what unblocks `--target
# aarch64-linux-android`: Android apps load shared libraries via
# GameActivity, so an executable link step at the top level can never
# produce a runnable artefact there. Desktop targets keep the same
# binary ergonomics through the `native` subpackage.
type = "lib"
standard = 23
platforms = [
    { os = "macos", arch = "aarch64" },
    { os = "windows", arch = "x86_64" },
    { os = "android", arch = "aarch64" },
]

[sync]
cmake-in-root = false

[target.'cfg(os = "macos")'.dependencies.cmake.libredwg]
git = "https://github.com/LibreDWG/libredwg.git"
tag = "0.13.4"
targets = "redwg"

[target.'cfg(os = "macos")'.dependencies.cmake.libredwg.options]
LIBREDWG_LIBONLY = "ON"
LIBREDWG_DISABLE_WRITE = "ON"
LIBREDWG_DISABLE_JSON = "ON"
DISABLE_WERROR = "ON"
BUILD_SHARED_LIBS = "OFF"
ENABLE_LTO = "OFF"
# memmem on macOS is a non-POSIX extension hidden behind
# _DARWIN_C_SOURCE; LibreDWG's decode.c uses it unconditionally.
# Without this, clang 16+ errors on the implicit declaration.
# (exon turns space-separated CMAKE_C_FLAGS into a `;`-separated cmake
# list; pass the single critical flag here.)
CMAKE_C_FLAGS = "-D_DARWIN_C_SOURCE"

[target.'cfg(os = "windows")'.dependencies.cmake.libredwg]
git = "https://github.com/LibreDWG/libredwg.git"
tag = "0.13.4"
targets = "libredwg"

[target.'cfg(os = "windows")'.dependencies.cmake.libredwg.options]
LIBREDWG_LIBONLY = "ON"
LIBREDWG_DISABLE_WRITE = "ON"
LIBREDWG_DISABLE_JSON = "ON"
DISABLE_WERROR = "ON"
BUILD_SHARED_LIBS = "OFF"
ENABLE_LTO = "OFF"

[target.'cfg(os = "android")'.dependencies.cmake.libredwg]
git = "https://github.com/LibreDWG/libredwg.git"
tag = "0.13.4"
targets = "redwg"

[target.'cfg(os = "android")'.dependencies.cmake.libredwg.options]
LIBREDWG_LIBONLY = "ON"
LIBREDWG_DISABLE_WRITE = "ON"
LIBREDWG_DISABLE_JSON = "ON"
DISABLE_WERROR = "ON"
BUILD_SHARED_LIBS = "OFF"
ENABLE_LTO = "OFF"

[dependencies]
"github.com/misut/cppx" = "1.9.0"

[dependencies.path]
phenotype = "../phenotype"
